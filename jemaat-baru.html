<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Jemaat Baru | GBI Altar Tabernakel Batam</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

<!-- ================= HEADER ================= -->

<nav class="navbar navbar-dark bg-primary shadow-sm sticky-top">

    <div class="container-fluid">

        <div class="d-flex align-items-center">

            <img src="https://via.placeholder.com/45"
            alt="Logo"
            width="30"
            height="30"
            class="me-3">

            <div>

                <h6 class="m-0 fw-bold">

                    GBI ALTAR TABERNAKEL

                </h6>

                <small>

                    Data Jemaat Baru

                </small>

            </div>

        </div>

        <div class="d-flex gap-2">
    <button
    class="btn btn-primary navbar-btn"
        onclick="loadData()"
        title="Refresh Data"
        aria-label="Refresh Data">

        <i class="fa-solid fa-rotate-right"></i>
        Refresh

    </button>

    <button
     class="btn btn-danger navbar-btn"
        onclick="showLogoutModal()"
        title="Logout"
        aria-label="Logout">

        <i class="fa-solid fa-right-from-bracket"></i>
        Logout

    </button>

</div>

    </div>

</nav>

<!-- ================= CONTENT ================= -->

<div class="container py-3">
    <div class="row mb-3">
        <div class="col-md-4">
            <div class="card shadow-sm">
                <div class="card-body text-center">
                    <h6>Total Jemaat Baru</h6>
                    <h2 id="totalData">

                        0

                    </h2>
                </div>
            </div>
        </div>

        <div class="col-md-8 mt-3 mt-md-0">

            <input
                type="text"
                class="form-control"
                placeholder="Cari nama jemaat..."
                id="searchInput">

        </div>

    </div>

    <!-- Loading -->

    <div
        id="loadingBox"
        class="text-center py-5">

        <div class="spinner-border text-primary"></div>

        <p class="mt-3">

            Mengambil data jemaat...

        </p>

    </div>

    <!-- Error -->

    <div
        id="errorBox"
        class="alert alert-danger d-none">

        Gagal mengambil data dari OpenSheet.

    </div>

    <!-- Empty -->

    <div
        id="emptyBox"
        class="alert alert-warning d-none">

        Belum ada jemaat yang mendaftar.

    </div>

    <!-- List -->

    <div id="listJemaat"></div>

</div>

<!-- ===================================================
OFFCANVAS DETAIL
=================================================== -->

<div class="offcanvas offcanvas-end"
     tabindex="-1"
     id="detailCanvas">

    <div class="offcanvas-header bg-primary text-white">

        <h5 class="offcanvas-title">

            Detail Jemaat

        </h5>

        <button
                type="button"
                class="btn-close btn-close-white"
                data-bs-dismiss="offcanvas"
                title="Tutup Detail Jemaat"
                aria-label="Tutup Detail Jemaat">
            </button>

    </div>

    <div class="offcanvas-body">

        <div id="detailContent">

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

<script src="js/jemaat-baru.js"></script>


<div
    class="modal fade"
    id="logoutModal"
    tabindex="-1">

    <div class="modal-dialog modal-dialog-centered">

        <div class="modal-content">

            <div class="modal-header bg-danger text-white">

                <h5 class="modal-title">

                    <i class="fa-solid fa-right-from-bracket"></i>

                    Logout

                </h5>

                <button
                    type="button"
                    class="btn-close btn-close-white"
                    data-bs-dismiss="modal"
                    title="Tutup"
                    aria-label="Tutup">
                </button>

            </div>

            <div class="modal-body text-center">

                <i class="fa-solid fa-circle-question fa-3x text-danger mb-3"></i>

                <h5>

                    Apakah Anda yakin ingin Logout?

                </h5>

                <p class="text-muted">

                    Anda harus login kembali untuk mengakses data jemaat.

                </p>

            </div>

            <div class="modal-footer">

                <button
                    class="btn btn-secondary"
                    data-bs-dismiss="modal">

                    Batal

                </button>

                <button
    class="btn btn-danger"
    onclick="logout()">

    Logout

</button>

            </div> <!-- modal-footer -->

        </div> <!-- modal-content -->

    </div> <!-- modal-dialog -->

</div> <!-- logoutModal -->


<!-- ===================================================
MODAL PREVIEW FOTO
=================================================== -->
<div
    class="modal fade"
    id="fotoModal"
    tabindex="-1">

    <div class="modal-dialog modal-dialog-centered modal-xl">

        <div class="modal-content bg-dark border-0">

            <div class="modal-header border-0">

                <button
                    type="button"
                    class="btn-close btn-close-white ms-auto"
                    data-bs-dismiss="modal">
                </button>

            </div>

            <div class="modal-body text-center">

                <img
                    id="fotoPreview"
                    class="img-fluid rounded"
                    style="max-height:85vh;">

            </div>
        </div>
    </div>
</div>

<!-- ===================================================
BOTTOM NAVIGATION
=================================================== -->

<nav class="bottom-nav">

    <a
        href="index.html"
        class="active">

        <i class="fa-solid fa-house"></i>

        <span>Index</span>

    </a>

    <a
        href="statistik.html">

        <i class="fa-solid fa-chart-pie"></i>

        <span>Statistik</span>

    </a>

    <a
        href="setting.html">

        <i class="fa-solid fa-gear"></i>

        <span>Setting</span>

    </a>

</nav>

</body>
</html>
