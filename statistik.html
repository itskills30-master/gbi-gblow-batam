<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Statistik | GBI Altar Tabernakel Batam</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
rel="stylesheet">

<link
rel="stylesheet"
href="css/style.css">

<link
rel="stylesheet"
href="css/statistik.css">

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<!-- ===================================================
HEADER
=================================================== -->

<nav class="navbar navbar-dark bg-primary shadow-sm sticky-top">

<div class="container-fluid d-flex align-items-center">

<button
class="btn btn-light btn-sm me-2"
onclick="kembaliIndex()">

<i class="fa-solid fa-arrow-left"></i>

</button>

<div class="flex-grow-1">

<h5 class="m-0 fw-bold">

📊 Statistik Jemaat

</h5>

<small>

GBI Altar Tabernakel Batam

</small>

</div>

<button
class="btn btn-light btn-sm"
onclick="loadStatistik()">

<i class="fa-solid fa-rotate-right"></i>

</button>

</div>

</nav>

<!-- ===================================================
CONTENT
=================================================== -->

<div class="container py-3">

<!-- SUMMARY -->

<div class="row g-3">

<div class="col-6">

<div class="summary-card bg-primary">

<i class="fa-solid fa-users"></i>

<h2 id="totalJemaat">0</h2>

<p>Total Jemaat</p>

</div>

</div>

<div class="col-6">

<div class="summary-card bg-success">

<i class="fa-solid fa-mars"></i>

<h2 id="totalPria">0</h2>

<p>Pria</p>

</div>

</div>

<div class="col-6">

<div class="summary-card bg-danger">

<i class="fa-solid fa-venus"></i>

<h2 id="totalWanita">0</h2>

<p>Wanita</p>

</div>

</div>

<div class="col-6">

<div class="summary-card bg-warning">

<i class="fa-solid fa-cross"></i>

<h2 id="totalBaptis">0</h2>

<p>Sudah Baptis</p>

</div>

</div>

</div>

<!-- ========================= -->

<div class="chart-card">

<h5>

👨 Jenis Kelamin

</h5>

<canvas id="chartGender"></canvas>

</div>

<div class="chart-card">

<h5>

🎂 Kelompok Umur

</h5>

<canvas id="chartUmur"></canvas>

</div>

<div class="chart-card">

<h5>

✝ Baptis Selam

</h5>

<canvas id="chartBaptis"></canvas>

</div>

<div class="chart-card">

<h5>

💍 Status Pernikahan

</h5>

<canvas id="chartPernikahan"></canvas>

</div>

<div class="chart-card">

<h5>

🏠 Status di GBI

</h5>

<canvas id="chartStatus"></canvas>

</div>

<div class="chart-card">

<h5>

🤝 KOMSEL / SDK

</h5>

<canvas id="chartKomsel"></canvas>

</div>

<div class="chart-card">

<h5>

📅 Bergabung dari Tahun

</h5>

<canvas id="chartTahun"></canvas>

</div>


<!-- ===================================================
BOTTOM NAVIGATION
=================================================== -->

<nav class="bottom-nav">

<a href="index.html">

<i class="fa-solid fa-house"></i>

<span>Index</span>

</a>

<a
href="statistik.html"
class="active">

<i class="fa-solid fa-chart-pie"></i>

<span>Statistik</span>

</a>

<a
href="setting.html">

<i class="fa-solid fa-gear"></i>

<span>Setting</span>

</a>

</nav>

<script src="js/statistik.js"></script>

</body>
</html>
